<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Divisas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="contenedor">
    <section class="tarjeta">
      <h1>Conversor de Divisas</h1>
      <p>Convierte monedas usando tasas de cambio actuales.</p>

      <div class="banderas">
        <div>
          <p>De</p>
          <img id="banderaOrigen" src="img/us.png" alt="Bandera origen">
        </div>

        <div>
          <p>A</p>
          <img id="banderaDestino" src="img/mx.png" alt="Bandera destino">
        </div>
      </div>

      <form id="formulario">
        <label for="cantidad">Cantidad</label>
        <input type="number" id="cantidad" placeholder="Ejemplo: 100">

        <label for="monedaOrigen">De:</label>
        <select id="monedaOrigen">
          <option value="USD">USD - Dólar estadounidense</option>
          <option value="MXN">MXN - Peso mexicano</option>
          <option value="EUR">EUR - Euro</option>
          <option value="GBP">GBP - Libra esterlina</option>
          <option value="JPY">JPY - Yen japonés</option>
          <option value="CAD">CAD - Dólar canadiense</option>
          <option value="BRL">BRL - Real brasileño</option>
        </select>

        <button type="button" id="intercambiar">⇄ Intercambiar Monedas</button>

        <label for="monedaDestino">A:</label>
        <select id="monedaDestino">
          <option value="MXN">MXN - Peso mexicano</option>
          <option value="USD">USD - Dólar estadounidense</option>
          <option value="EUR">EUR - Euro</option>
          <option value="GBP">GBP - Libra esterlina</option>
          <option value="JPY">JPY - Yen japonés</option>
          <option value="CAD">CAD - Dólar canadiense</option>
          <option value="BRL">BRL - Real brasileño</option>
        </select>

        <button type="submit">Convertir</button>
      </form>

      <div id="mensaje"></div>
      <div id="resultado"></div>

      <p id="contador">Conversiones realizadas: 0</p>

      <h3>Historial</h3>
      <ul id="historial"></ul>

      <button type="button" id="limpiarHistorial">Limpiar Historial</button>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
